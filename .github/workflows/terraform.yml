name: Terraform

on:
  push:
    branches:
      - master

jobs:
  terraform:
    name: Terraform plan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: folder structure
      run: |
        pwd
        ls -l 
        ls -l Azure-Infra/environments/dev || true

    - name: Terrform steup
      uses: hashicorp/setup-terraform@v4
      with:
       terraform_version: 1.15.3
    
    - name: Azure Login
      uses: azure/login@v3
      with:
        creds: |
          {
            "clientId": "${{ secrets.ARM_CLIENT_ID }}",
            "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
            "tenantId": "${{ secrets.ARM_TENANT_ID }}",
            "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}"
          }

    - name: Terraform Init
      working-directory: Azure-Infra/environments/dev
      run: terraform init

    - name: Terraform validate
      working-directory: Azure-Infra/environments/dev  
      run: terraform validate

    - name: Terraform plan
      working-directory: Azure-Infra/environments/dev  
      run: terraform plan -out=tfplan

    - name: Upload Terraform plan
      uses: actions/upload-artifact@v6
      with:
        name: tfplan
        path: Azure-Infra/environments/dev/tfplan

  terraform-apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: terraform

    environment: 
      name: terraform-approval

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: HashiCorp - Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: 1.15.3

    - name: Azure Login
      uses: azure/login@v3
      with:
        creds: |
          {
            "clientId": "${{ secrets.ARM_CLIENT_ID }}",
            "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
            "tenantId": "${{ secrets.ARM_TENANT_ID }}",
            "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}"
          }

    - name: Download Terraform Plan
      uses: actions/download-artifact@v6
      with:
        name: tfplan
        path: Azure-Infra/environments/dev

    - name: Terraform Init
      working-directory: Azure-Infra/environments/dev
      run: terraform init

    - name: Terraform apply
      working-directory: Azure-Infra/environments/dev
      run: terraform apply -auto-approve tfplan